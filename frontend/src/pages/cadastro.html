<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../assets/styles/cadastro.css" />
  </head>
  <body>
    <section class="primary">
      <div class="primary_container">
        <div class="primary_title">
          <img src="../assets/img/icone controle.png" alt="" />
          <h1>EduPlay</h1>
        </div>
        <div class="primary_desc">
          <div class="primary_entrar">
            <h1>Criar Conta</h1>
            <p>Cadastre-se para começar a aprender jogando</p>
          </div>
        <div class="primary_input">
          <form id="formCadastro">    
            <div class="input_group">
              <label for="inputNome">Nome</label>
              <input type="text" name="nome" id="inputNome" placeholder="Seu nome" required />
            </div>
            <div class="input_group">
              <label for="inputEmail">E-mail</label>
              <input type="email" name="email" id="inputEmail" placeholder="seu@email.com" required />
            </div>
            <div class="input_group">
              <label for="inputSenha">Senha</label>
              <input type="password" name="senha" id="inputSenha" placeholder="••••••••" required/>
            </div>
            <div class="input_group">
              <label for="inputConfirmarSenha">Confirmar Senha</label>
              <input type="password" id="inputConfirmarSenha" placeholder="••••••••" required />
            </div>
            <div class="primary_botao">
              <button id="btnCadastrar">Cadastrar</button>
            </div>
          </form>
          </div>
          <div class="primary_footer">
            <p>Já tem conta?</p>
            <a href="entrar.html">Entrar</a>
          </div>
        </div>
      </div>
      </div>
    </section>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script type="module" src="../components/cadastro.js"></script>
</html>
