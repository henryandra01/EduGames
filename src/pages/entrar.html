<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../assets/styles/entrar.css" />
  </head>
  <body>
    <section class="primary">
      <div class="primary_container">
        <div class="primary_title">
          <img src="../assets/img/icone controle.png" alt="" />
          <h1>EduPlay</h1>
        </div>
        <div class="primary_desc">
          <div class="primary_entrar">
            <h1>Entrar</h1>
            <p>Acesse sua conta para continuar jogando</p>
          </div>

          <div class="primary_input">
            <form action="">
              <label for="email">E-mail</label>
              <input type="email" name="email" id="emailInput" placeholder="seu@email.com" required/>
            </form>
            <form action="">
              <label for="senha">Senha</label> 
              <input type="password" name="senha" id="senhaInput" placeholder="••••••••" required/>
            </form>
            <div class="primary_botao">
              <button id="btnLogin">Entrar</button>
            </div>
            <div class="primary_footer">
              <p>Não tem conta?</p>
              <a href="cadastro.html">Cadastre-se</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
  <script type="module" src="../components/entrar.js"></script>
</html>
