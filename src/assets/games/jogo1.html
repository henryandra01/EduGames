<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../assets/jogo1.css" />
  </head>
  <body>
    <section class="primary">
      <div class="primary_container">
        <div class="primary_desc">
          <div class="primary_top">
            <div class="primary_texto">
              <button class="primary_numero" href="">1/10</button>
              <button href="">Conhecimentos Gerais</button>
            </div>
            <div class="">
              <button class="primary_timer">TEMPO ACABOU!!</button>
            </div>
            <div class="primary_estrela">
              <img src="../assets/img/coracao img.png" alt="" />
              <a href=""></a>
            </div>
          </div>
          <div class="primary_barra"></div>
          <div class="primary_tempo">
            <div class="primary_gradual"></div>
          </div>
          <div class="primary_questions">
            <a href="" id="titulopag"></a>
            <ul>
              <li></li>
              <li></li>
              <li></li>
              <li></li>
            </ul>
            <button class="primary_botao">Próxima Pergunta</button>
          </div>
        </div>
      </div>
    </section>
    <section class="second">
      <div class="second_container">
        <div class="second_h1">
          <h1>Fim De Jogo!!</h1>
        </div>
        <div class="second_reiniciar">
          <button class="second_botao">Reiniciar</button>
        </div>
      </div>
    </section>

    <section class="third">
      <div class="third_container">
        <div class="third_h1">
          <h1>Você Ganhou, Parabéns!!</h1>
        </div>
        <div class="third_reiniciar">
          <a href="../index.html" class="third_botao">Voltar para o ínicio</a>
        </div>
      </div>
    </section>

    <section class="fourty_section">
      <main class="fourty_container">
        <div>
          <div class="fourty_emoji">🧠</div>

          <h1 class="fourty_title">
            Quiz <span class="fourty_accent">Master</span>
          </h1>

          <p class="fourty_subtitle">
            Teste seus conhecimentos e suba de nível!
          </p>
        </div>

        <section class="fourty_stats">
          <div class="fourty_stat">
            <span class="fourty_icon">📝</span>
            <span class="fourty_value">10</span>
            <span class="fourty_label">Perguntas</span>
          </div>

          <div class="fourty_stat">
            <span class="fourty_icon">⏱️</span>
            <span class="fourty_value">15s</span>
            <span class="fourty_label">Por pergunta</span>
          </div>

          <div class="fourty_stat">
            <span class="fourty_icon">🏆</span>
            <span class="fourty_value">6</span>
            <span class="fourty_label">Níveis</span>
          </div>
        </section>

        <section class="fourty_rules">
          <h2 class="fourty_rules_title">Como jogar</h2>

          <ul class="fourty_rules_list">
            <li class="fourty_rules_item">
              <span class="fourty_success_mark">✓</span>
              Resposta correta:
              <span class="fourty_success_text">Não Perde Vidas</span>
            </li>

            <li class="fourty_rules_item">
              <span class="fourty_error_mark">✗</span>
              Resposta errada:
              <span class="fourty_error_text">-1 Vida</span>
            </li>

            <li class="fourty_rules_item">
              <span class="fourty_warn_mark">⏱</span>
              Tempo esgotado:
              <span class="fourty_warn_text">-1 Vida</span>
            </li>
          </ul>
        </section>

        <button class="fourty_button">Começar Quiz 🚀</button>
      </main>
    </section>
    <script src="../jogo1.js"></script>
  </body>
</html>
